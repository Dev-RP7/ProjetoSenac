<div class="content-container">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Email</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        @for (medicos of listaMedicos; track medicos){
        <tr>
          <td>{{ medicos.id }}</td>
          <td>{{ medicos.nome }}</td>
          <td>{{ medicos.email }}</td>
          <td>
            <button *ngIf="medicos.id" class="btn-editar" [routerLink]="['/auth/alterar-medico', medicos.id]">Editar</button>
            <button class="btn-excluir" (click)="excluir(medicos.id!)">Excluir</button>
          </td>
        </tr>
      }
      </tbody>
    </table>
  </div>
