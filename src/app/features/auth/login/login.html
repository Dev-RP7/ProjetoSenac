<div class="page">

    <div class="login-container">

        <div class="logo">
            <div class="icon">🏥</div>

            <h1>MedScan</h1>

            <p>Sistema de Consultas Médicas</p>
        </div>

        <form (ngSubmit)="entrar()">

            <div class="input-group">
                <label>Email</label>

                <input 
                    type="email" 
                    placeholder="Digite seu email"
                    [(ngModel)]="email"
                    name="email"
                >
            </div>

            <div class="input-group">
                <label>Senha</label>

                <input 
                    type="password" 
                    placeholder="Digite sua senha"
                    [(ngModel)]="senha"
                    name="senha"
                >
            </div>

            <button type="submit" class="login-btn">
                Entrar
            </button>

        </form>

        <div class="links">

            <a routerLink="/forgot-password" class="forgot-link">
                Esqueci minha senha
            </a>

            <a routerLink="/register" class="register-link">
                Criar conta
            </a>

        </div>

    </div>

</div>
