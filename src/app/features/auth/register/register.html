
    <div class="register-container">

        <div class="logo">
            <div class="icon">🏥</div>
            <h1>MedScan</h1>
            <p>Crie sua conta</p>
        </div>

        <form (ngSubmit)="submeter()">

            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" placeholder="Digite seu nome" name="nome" [(ngModel)]="usuario.nome" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Digite seu email" name="email" [(ngModel)]="usuario.email" required>
            </div>

            <div class="input-group">
                <label>CPF</label>
                <input type="text" placeholder="Digite seu CPF" name="cpf" [(ngModel)]="usuario.cpf">
            </div>

            <div class="input-group">
                <label>Telefone</label>
                <input type="text" placeholder="Digite seu telefone" name="telefone" [(ngModel)]="usuario.telefone" required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" placeholder="Digite sua senha" name="senha" [(ngModel)]="usuario.senha" required>
            </div>

            <div class="input-group">
                <label>Tipo</label>
                <select name="tipo" [(ngModel)]="usuario.tipo" required>
                    <option value="USUARIO">USUARIO</option>
                    <option value="MEDICO">MEDICO</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>

            <button type="submit" class="register-btn">
                Cadastrar
            </button>

        </form>

        <div class="links">
            <a href="#">Já possui conta? Entrar</a>
        </div>

    </div>
